<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración CRUD | Quinta Dalam</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dianacamposrosas/Proyecto-Hotel@main/css/forms.css">
</head>
<body>

    <header>
        <div class="logo-titulo">
            <h1>Hotel Quinta Dalam</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
        <h2 style="text-align: center; color: #2e4029; margin-bottom: 10px;">Panel de Administración</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Gestión de inventario: Altas, bajas y modificaciones de habitaciones.</p>

        <form action="#" method="post" style="margin: 0 auto;">
            
            <fieldset style="border: 2px solid #eee; padding: 20px; border-radius: 8px; margin-bottom: 25px; background-color: #fafafa;">
                <legend style="font-weight: bold; color: #2e4029; padding: 0 10px;">Tipo de Movimiento</legend>
                <div style="display: flex; gap: 20px; margin-top: 10px; justify-content: center;">
                    <label style="display: inline; font-weight: normal; cursor: pointer;">
                        <input type="radio" name="accion" value="alta" checked> Alta (Nueva)
                    </label>
                    <label style="display: inline; font-weight: normal; cursor: pointer;">
                        <input type="radio" name="accion" value="modificar"> Modificar
                    </label>
                    <label style="display: inline; font-weight: normal; cursor: pointer;">
                        <input type="radio" name="accion" value="baja"> Baja (Eliminar)
                    </label>
                </div>
            </fieldset>

            <label for="codigo_hab">Código de Habitación (Requerido para modificar/eliminar):</label>
            <input type="text" id="codigo_hab" name="codigo_hab" placeholder="Ej. HAB-001">

            <label for="nombre_hab">Nombre de la Habitación:</label>
            <input type="text" id="nombre_hab" name="nombre_hab" placeholder="Ej. Suite Tzintzuntzan">

            <label for="precio_hab">Precio por Noche ($ MXN):</label>
            <input type="number" id="precio_hab" name="precio_hab" placeholder="Ej. 1500" min="0">

            <label for="desc_hab">Descripción y Amenidades:</label>
            <textarea id="desc_hab" name="desc_hab" rows="4" placeholder="Ingresa los detalles, si tiene jacuzzi, vista, etc..."></textarea>

            <div style="display: flex; gap: 15px; margin-top: 15px;">
                <button type="submit" class="btn-buscar" style="flex: 1;">Ejecutar Acción</button>
                <button type="reset" class="btn-buscar" style="flex: 1; background-color: #888;">Limpiar Formulario</button>
            </div>
        </form>
    </main>

    <footer style="text-align: center; background-color: #2e4029; color: white; padding: 20px; margin-top: 40px;">
        <p class="copyright" style="font-size: 0.8em; color: #ccc;">© 2026 Hotel Quinta Dalam. Acceso exclusivo para administradores.</p>
    </footer>

</body>
</html>
